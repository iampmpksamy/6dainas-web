services:

  web:
    image: ${WEB_IMAGE}
    container_name: 6dainas-web
    restart: always
    env_file: ../../.env.local
    environment:
      NODE_ENV: production
      PORT: 3000
    # Bind to localhost only — Caddy on the HomeLab reverse-proxies 6dainas.cloud here.
    # 127.0.0.1 binding means the port is NOT reachable from the internet directly.
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 2>/dev/null | grep -q '<' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - 6dainas-web
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  6dainas-web:
    driver: bridge
