services:

  web:
    image: ${WEB_IMAGE}
    container_name: 6dainas-web
    restart: always
    env_file: ../../.env.local
    environment:
      NODE_ENV: production
      PORT: 3000
    # Port is NOT exposed to the host — Caddy on the HomeLab proxies to this container
    # Add `ports: ["3000:3000"]` only if running without an external reverse proxy
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 2>/dev/null | grep -q '<' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - 6dainas-web
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  6dainas-web:
    driver: bridge
