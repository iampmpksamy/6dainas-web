services:

  web:
    image: ${WEB_IMAGE:-ghcr.io/iampmpksamy/6dainas-web:main}
    container_name: 6dainas-web
    restart: always
    env_file: ../../.env.local
    environment:
      NODE_ENV: production
      PORT: 3000
    # Bind only to localhost — Caddy (running as a system service) proxies to this port.
    # Never expose directly to 0.0.0.0 in production.
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 2>/dev/null | grep -q '<' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - 6dainas-web
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  6dainas-web:
    driver: bridge
